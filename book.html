<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now - Cafe 65</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  display:flex;
  height:100vh;
}

/* LEFT & RIGHT IMAGE GRID */
.side {
  width:25%;
  display:flex;
  flex-direction:column;
}

.side img {
  width:100%;
  height:33.33%;
  object-fit:cover;
}

/* CENTER */
.center {
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;

  /* 👇 Background image */
  background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');
  background-size: cover;
  background-position: center;
  position: relative;
}
  .center::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);
}
  

.box {
  background:white;
  padding:30px;
  width:80%;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  .box {
  position: relative;
  z-index: 1;
}
}

/* TEXT */
.box p {
  font-size:13px;
  margin-bottom:15px;
}

/* BUTTONS */
.btn {
  display:block;
  background:#111;
  color:white;
  padding:12px;
  margin:8px 0;
  text-decoration:none;
  font-size:14px;
}

.btn:hover {
  background:#28a745;
}

/* CONTACT */
.contact {
  margin-top:15px;
  font-size:13px;
  color:#555;
}
</style>
</head>
   <!-- Left Side -->
     <section class="footer">
  <div class="footer-container">
    <div class="footer-left">
      <h2>SIGN UP TO RECEIVE 10% <br> OFF YOUR FIRST ORDER</h2>
      <div class="email-box">
        <input type="email" placeholder="Enter your email">
        <button>➜</button>
      </div>

      <div class="social-icons">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Right Side -->
    <div class="footer-right">
      <div>
        <h3>QUICK LINKS</h3>
        <p>Book Now</p>
        <p>Order Online</p>
        <p>Locations</p>
        <p>Menu</p>
        <p>Specials</p>
        <p>Gift Card</p>
        <p>Contact</p>
      </div>

      <div>
        <h3>COLLECTIONS</h3>
        <p>Speciality Beans</p>
        <p>Keep Cups and Bottles</p>
        <p>Premium Matcha</p>
        <p>Powders and Syrups</p>
        <p>Milk Lab</p>
        <p>Merch</p>
      </div>
    </div>

  </div>

  </section>
<footer>
  <p>&copy; 2026 Cafe 65. All rights reserved.</p>
</footer>
</body>
</html>
