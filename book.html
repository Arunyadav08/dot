<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now - Cafe 65</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  display:flex;
  height:100vh;
}

/* LEFT & RIGHT IMAGE GRID */
.side {
  width:25%;
  display:flex;
  flex-direction:column;
}

.side img {
  width:100%;
  height:33.33%;
  object-fit:cover;
}

/* CENTER */
.center {
  width:50%;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:30px;
  width:80%;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* TEXT */
.box p {
  font-size:13px;
  margin-bottom:15px;
}

/* BUTTONS */
.btn {
  display:block;
  background:#111;
  color:white;
  padding:12px;
  margin:8px 0;
  text-decoration:none;
  font-size:14px;
}

.btn:hover {
  background:#28a745;
}

/* CONTACT */
.contact {
  margin-top:15px;
  font-size:13px;
  color:#555;
}
</style>
</head>

<body>

<!-- LEFT IMAGES -->
<div class="side">
  <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
  <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
  <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061">
</div>

<!-- CENTER -->
<div class="center">
  <div class="box">
    <p>For reservations larger than 10 guests, please email directly.</p>
    <p>7% service fee applies on weekends.</p>

    <a href="#" class="btn">Cafe 65 - Mahendergarh</a>
    <a href="#" class="btn">Cafe 65 - Delhi</a>
    <a href="#" class="btn">Cafe 65 - Gurgaon</a>
    <a href="#" class="btn">Cafe 65 - Jaipur</a>
    <a href="#" class="btn">Cafe 65 - Chandigarh</a>
    <a href="#" class="btn">Cafe 65 - Noida</a>

    <div class="contact">Contact Us</div>
  </div>
</div>

<!-- RIGHT IMAGES -->
<div class="side">
  <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
  <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
  <img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
</div>

</body>
</html>
