<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now - Cafe 65</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  display:flex;
  height:100vh;
}

/* Side Images */
.side {
  width:25%;
  background-size:cover;
  background-position:center;
}

.left {
  background-image:url('https://source.unsplash.com/600x800/?cafe,food');
}

.right {
  background-image:url('https://source.unsplash.com/600x800/?dessert,cafe');
}

/* Center */
.center {
  width:50%;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:30px;
  width:80%;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.btn {
  display:block;
  background:#111;
  color:white;
  padding:12px;
  margin:10px 0;
  text-decoration:none;
}

.btn:hover {
  background:#28a745;
}
</style>
</head>

<body>

<div class="side left"></div>

<div class="center">
  <div class="box">
    <h2>Reserve Your Table</h2>

    <a href="#" class="btn">Cafe 65 - Mahendergarh</a>
    <a href="#" class="btn">Cafe 65 - Delhi</a>
    <a href="#" class="btn">Cafe 65 - Gurgaon</a>
    <a href="#" class="btn">Cafe 65 - Jaipur</a>

  </div>
</div>

<div class="side right"></div>

</body>
</html>
