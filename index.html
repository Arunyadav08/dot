<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe 65</title>
  <style>
    * {
      margin:0; padding:0; box-sizing:border-box; font-family:'Roboto',sans-serif;
    }

    /* Header */
    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 30px; background-color:#f8f9fa; border-bottom:1px solid #ddd;
    }
    .logo {width:80px; height:80px;}
    .header-center a {
      margin:0 10px; text-decoration:none; color:#333; font-weight:500;
    }
    .header-center a:hover {color:#28a745;}
    .header-right {display:flex; align-items:center;}
    .search {padding:5px 10px; margin-right:10px; border-radius:5px; border:1px solid #ccc;}

    /* Premium icons */
    .icon {
      width:35px; height:35px; margin-left:10px; cursor:pointer;
      border-radius:50%; background-color:#28a745; display:flex;
      justify-content:center; align-items:center; color:white;
      font-size:18px; font-weight:bold; box-shadow:0 0 8px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .icon:hover {transform:scale(1.1);}

    /* Hero Section */
    .hero {height:5cm; position:relative; overflow:hidden;}
    .slider {width:100%; height:100%; position:relative;}
    .slide {
      width:100%; height:100%; position:absolute; top:0; left:0;
      display:flex; justify-content:center; align-items:center;
      color:white; font-size:1.2em; opacity:0; transition:opacity 1s ease-in-out;
    }
    .slide.active {opacity:1;}

    /* Sections */
    section {padding:40px 20px;}
    h2 {margin-bottom:10px; color:#28a745;}
    p {margin-bottom:15px;}

    /* Footer */
    footer {text-align:center; padding:20px; background-color:#f8f9fa; border-top:1px solid #ddd;}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="https://via.placeholder.com/80x80.png?text=Cafe+65" alt="Cafe 65 Logo" class="logo">
  </div>
  <nav class="header-center">
    <a href="home.html">Home</a>
    <a href="book.html">Book Now</a>
    <a href="order.html">Order Online</a>
    <a href="location.html">Location</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="header-right">
    <input type="text" placeholder="Search 🔍" class="search">
    <div class="icon">👤</div>
    <div class="icon">🛒</div>
  </div>
</header>

<!-- Hero Section -->
<section class="hero">
  <div class="slider">
    <div class="slide active" style="background-color:#28a745;">Book your table online today</div>
    <div class="slide" style="background-color:#218838;">Enjoy Our Fresh Coffee & Snacks</div>
    <div class="slide" style="background-color:#1e7e34;">Delicious Breakfast & Brunch</div>
  </div>
</section>


<footer>
  <p>&copy; 2026 Cafe 65. All rights reserved.</p>
</footer>

<script>
  // Hero Slider JS
  let slides = document.querySelectorAll('.slide');
  let current = 0;
  function showSlide(index){
    slides.forEach(slide => slide.classList.remove('active'));
    slides[index].classList.add('active');
  }
  setInterval(()=>{
    current++;
    if(current>=slides.length) current=0;
    showSlide(current);
  },3000);
</script>

</body>
</html>
