<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Website</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 30px;
      background-color: #f8f9fa;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      width: 80px;
      height: 80px;
    }

    .header-center a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .header-center a:hover {
      color: #28a745;
    }

    .header-right {
      display: flex;
      align-items: center;
    }

    .search {
      padding: 5px 10px;
      margin-right: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .icon {
      width: 30px;
      height: 30px;
      margin-left: 10px;
      cursor: pointer;
    }

    /* Hero Section */
    .hero {
      height: 400px;
      position: relative;
      overflow: hidden;
    }

    .slider {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2em;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .slide.active {
      opacity: 1;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      background-color: #f8f9fa;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <img src="https://via.placeholder.com/80x80.png?text=Logo" alt="Cafe Logo" class="logo">
    </div>
    <nav class="header-center">
      <a href="index.html" target="_blank">Home</a>
      <a href="book.html" target="_blank">Book Now</a>
      <a href="order.html" target="_blank">Order Online</a>
      <a href="location.html" target="_blank">Location</a>
      <a href="menu.html" target="_blank">Menu</a>
      <a href="about.html" target="_blank">About</a>
      <a href="contact.html" target="_blank">Contact</a>
    </nav>
    <div class="header-right">
      <input type="text" placeholder="Search 🔍" class="search">
      <img src="https://via.placeholder.com/30.png?text=👤" alt="Profile" class="icon">
      <img src="https://via.placeholder.com/30.png?text=🛒" alt="Cart" class="icon">
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="slider">
      <div class="slide active" style="background-color:#28a745;"> 
        <h1>Book your table online today</h1>
      </div>
      <div class="slide" style="background-color:#218838;">
        <h1>Enjoy Our Fresh Coffee & Snacks</h1>
      </div>
      <div class="slide" style="background-color:#1e7e34;">
        <h1>Delicious Breakfast & Brunch</h1>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Cafe. All rights reserved.</p>
  </footer>

  <script>
    // Hero Slider JS
    let slides = document.querySelectorAll('.slide');
    let current = 0;

    function showSlide(index) {
      slides.forEach(slide => slide.classList.remove('active'));
      slides[index].classList.add('active');
    }

    // Auto slider every 3 seconds
    setInterval(() => {
      current++;
      if(current >= slides.length) current = 0;
      showSlide(current);
    }, 3000);
  </script>
</body>
</html>
