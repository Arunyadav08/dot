<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Website</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <img src="https://via.placeholder.com/80x80.png?text=Logo" alt="Cafe Logo" class="logo">
    </div>
    <nav class="header-center">
      <a href="index.html">Home</a>
      <a href="book.html">Book Now</a>
      <a href="order.html">Order Online</a>
      <a href="location.html">Location</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="header-right">
      <input type="text" placeholder="Search 🔍" class="search">
      <img src="https://via.placeholder.com/30.png?text=👤" alt="Profile" class="icon">
      <img src="https://via.placeholder.com/30.png?text=🛒" alt="Cart" class="icon">
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="slider">
      <div class="slide active" style="background-color:#28a745;"> 
        <h1>Book your table online today</h1>
      </div>
      <div class="slide" style="background-color:#218838;">
        <h1>Enjoy Our Fresh Coffee & Snacks</h1>
      </div>
      <div class="slide" style="background-color:#1e7e34;">
        <h1>Delicious Breakfast & Brunch</h1>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Cafe. All rights reserved.</p>
  </footer>
</body>
</html>
